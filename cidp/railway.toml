[build]
# rootDirectory is /cidp, so Dockerfile path is relative to that
dockerfilePath = "Dockerfile"

[deploy]
# NO startCommand — let Dockerfile CMD handle it via entrypoint.py
# This avoids $PORT shell expansion issues
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
