# Docker Compose for local development: Open WebUI + El Monstruo Kernel
# Usage: docker compose -f deploy/docker-compose.openwebui.yml up
#
# Anti-autoboicot validated: 2026-04-16
# Open WebUI: v0.8.12 (ghcr.io/open-webui/open-webui:main)

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: monstruo-webui
    ports:
      - "3001:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      # Connect to kernel via Docker network
      - OPENAI_API_BASE_URL=http://host.docker.internal:8000/openai/v1
      - OPENAI_API_KEY=${MONSTRUO_API_KEY:-dev-key}
      # Disable Ollama
      - OLLAMA_BASE_URL=
      # Security
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-change-me-in-production}
      - ENABLE_SIGNUP=false
      - ENABLE_LOGIN_FORM=true
      - DEFAULT_USER_ROLE=admin
      - WEBUI_AUTH=true
      # Disable telemetry
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=true
      - ANONYMIZED_TELEMETRY=false
      # Features
      - ENABLE_WEBSOCKET_SUPPORT=true
      - ENABLE_COMMUNITY_SHARING=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  open-webui-data:
