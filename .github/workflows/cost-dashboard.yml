name: Embrión · Cost History Dashboard

# Regenera el dashboard estático del costo del embrión y lo commitea de vuelta
# a `bridge/embrion_dashboard.html`. Sin secretos en el HTML — todo se renderiza
# server-side y solo se publica el resultado.
#
# Triggers:
#   * push a main que toque kernel/dashboards/** o kernel/embrion_budget.py
#   * cron horario (cada 6h) para mantenerlo fresco
#   * manual (workflow_dispatch)
#
# Secrets requeridos (Settings → Secrets → Actions):
#   - SUPABASE_URL
#   - SUPABASE_SERVICE_KEY (read-only sobre embrion_budget_state)

on:
  push:
    branches: [main]
    paths:
      - "kernel/dashboards/**"
      - "kernel/embrion_budget.py"
      - ".github/workflows/cost-dashboard.yml"
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: cost-dashboard
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install requests structlog

      - name: Generate dashboard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EMBRION_DAILY_BUDGET_USD: "5.0"
          EMBRION_CAP_PER_LATIDO_USD: "0.05"
        run: |
          python -m kernel.dashboards.cost_history \
            --output bridge/embrion_dashboard.html \
            --limit 500

      - name: Verify HTML well-formed
        run: |
          test -s bridge/embrion_dashboard.html
          head -c 16 bridge/embrion_dashboard.html | grep -q "<!DOCTYPE html>"
          grep -q "</html>" bridge/embrion_dashboard.html

      - name: Commit and push if changed
        run: |
          git config user.name  "embrion-dashboard-bot"
          git config user.email "embrion-dashboard-bot@users.noreply.github.com"
          if git diff --quiet bridge/embrion_dashboard.html; then
            echo "No changes — skipping commit"
            exit 0
          fi
          git add bridge/embrion_dashboard.html
          git commit -m "chore(embrion): refresh cost-history dashboard [skip ci]"
          git push

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: embrion-cost-dashboard
          path: bridge/embrion_dashboard.html
          retention-days: 30
