name: Credentials Rotation Reminder

on:
  schedule:
    # Lunes 10:00 UTC = 04:00 CST (mañana del día laborable)
    - cron: '0 10 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-rotations:
    name: Check credential rotation status (DSC-S-008)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run rotation check
        id: rotcheck
        continue-on-error: true
        run: |
          mkdir -p reports
          python3 scripts/_check_credential_rotations.py \
            --inventory bridge/credentials_inventory.md \
            --threshold-pct 80 \
            --output reports/rotation_alerts.md
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rotation-alerts-report
          path: reports/rotation_alerts.md
          retention-days: 90

      - name: Open issue if alerts present
        if: steps.rotcheck.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('reports/rotation_alerts.md', 'utf8');
            const today = new Date().toISOString().slice(0, 10);
            const title = `[Auto] Rotation reminder — ${today}`;
            const labels = ['security', 'rotation-reminder', 'auto-generated'];

            // Check if there's already an open issue with same title prefix
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'rotation-reminder',
            });
            const dup = existing.data.find(i => i.title.startsWith('[Auto] Rotation reminder'));

            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dup.number,
                body: `## Update ${today}\n\n${body}`,
              });
              core.notice(`Updated existing issue #${dup.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: labels,
              });
              core.notice(`Opened new issue #${created.data.number}`);
            }

      - name: Fail job if alerts present
        if: steps.rotcheck.outputs.exit_code == '1'
        run: |
          echo "::warning::Hay credenciales que requieren rotación. Revisa el issue auto-generado."
          exit 1
