# Secret scanning workflow (Sprint S-001 task S-1.4)
# Reference: bridge/sprints_propuestos/sprint_S001_security_hardening.md
# DSC-S-002: pre-commit obligatorio + CI defense-in-depth

name: Secret Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Run nightly to catch any drift
    - cron: '0 4 * * *'

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

  trufflehog:
    name: Trufflehog
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
