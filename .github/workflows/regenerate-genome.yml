name: Regenerate MONSTRUO_GENOME (Sprint 91.8)

# Mantiene MONSTRUO_GENOME.yaml siempre actualizado contra la realidad del repo.
# Trigger:
#   - Diario 07:00 UTC (=01:00 CDMX) — captura cambios externos (PRs nocturnas).
#   - Push a main que toque kernel/**, embriones/**, apps/**, scripts/genome_generator.py.
# Acción:
#   - Corre scripts/genome_generator.py.
#   - Si hay diff vs main, commitea directamente a main como bot[bot].
#   - Si no hay diff, termina silenciosamente (idempotente).
#
# Decisión binaria: commit directo a main (no PR) porque GitHub Actions no
# tiene permiso de "create or approve pull requests" sin un PAT, y este
# repo se mergea con --admin --squash de todas formas. Aceptamos commits
# directos del bot — son siempre regeneraciones determinísticas del genoma.

on:
  schedule:
    - cron: '0 7 * * *'  # 07:00 UTC diario
  push:
    branches: [main]
    paths:
      - 'kernel/**'
      - 'embriones/**'
      - 'apps/**'
      - 'scripts/genome_generator.py'
      - 'scripts/genome_live/**'
      - 'migrations/sql/**'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Razón para regenerar manualmente'
        required: false
        default: 'manual_trigger'

permissions:
  contents: write

concurrency:
  group: regenerate-genome
  cancel-in-progress: false  # Nunca cancelar regeneración en curso.

jobs:
  regenerate:
    name: Regenerar MONSTRUO_GENOME.yaml
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip if commit was already made by this bot (avoid infinite loop on push trigger).
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip-genome-regen]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install pyyaml

      - name: Snapshot del genoma actual (para diff)
        run: |
          if [ -f MONSTRUO_GENOME.yaml ]; then
            cp MONSTRUO_GENOME.yaml /tmp/genome_before.yaml
          else
            echo "(no genome existing)" > /tmp/genome_before.yaml
          fi

      - name: Regenerar MONSTRUO_GENOME.yaml
        run: |
          python3 scripts/genome_generator.py
          echo "----- HEAD del genoma regenerado -----"
          head -25 MONSTRUO_GENOME.yaml

      - name: Verificar si hay diff
        id: diff
        run: |
          if diff -q /tmp/genome_before.yaml MONSTRUO_GENOME.yaml > /dev/null; then
            echo "has_diff=false" >> $GITHUB_OUTPUT
            echo "El genoma no cambió — nada que commitear."
          else
            echo "has_diff=true" >> $GITHUB_OUTPUT
            echo "El genoma cambió. Diff resumido:"
            diff /tmp/genome_before.yaml MONSTRUO_GENOME.yaml | head -50 || true
          fi

      - name: Commit directo a main si hay diff
        if: steps.diff.outputs.has_diff == 'true'
        run: |
          git config user.name "monstruo-bot[bot]"
          git config user.email "monstruo-bot@users.noreply.github.com"
          git add MONSTRUO_GENOME.yaml
          git commit -m "chore(genome): regenerar MONSTRUO_GENOME.yaml [skip-genome-regen]

          Auto-regenerado por workflow regenerate-genome.yml
          Trigger: ${{ github.event_name }}
          Run: ${{ github.run_id }}

          [skip-genome-regen] evita infinite loop en push trigger."
          git push origin main

      - name: Summary
        run: |
          echo "### MONSTRUO_GENOME regeneration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Has diff: ${{ steps.diff.outputs.has_diff }}" >> $GITHUB_STEP_SUMMARY
          if [ -f MONSTRUO_GENOME.yaml ]; then
            echo "- Size: $(wc -c < MONSTRUO_GENOME.yaml) bytes" >> $GITHUB_STEP_SUMMARY
            echo "- Lines: $(wc -l < MONSTRUO_GENOME.yaml)" >> $GITHUB_STEP_SUMMARY
            echo "- generated_at: $(grep '^  generated_at:' MONSTRUO_GENOME.yaml | head -1)" >> $GITHUB_STEP_SUMMARY
          fi
