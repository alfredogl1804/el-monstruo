name: Heartbeat Scheduler R0

# SPR-REACTOR-SCHEDULER-R0-001
# Executes Heartbeat R0 audit-only every 12 hours.
# Mode: report-only, $0 budget (100% local).
# Kill-switch: scheduler/scheduler_kill_switch.json
# Anti-loop: scheduler_state.json tracks windows.
# If 2 consecutive failures → PAUSED (requires T1 to resume).

on:
  schedule:
    # Every 12 hours: 06:00 UTC and 18:00 UTC
    - cron: '0 6,18 * * *'
  workflow_dispatch:
    # Manual trigger for testing/dry-run

jobs:
  heartbeat-r0:
    runs-on: ubuntu-latest
    # Only run on the monstruo-reality-atlas-001 branch
    if: github.ref == 'refs/heads/monstruo-reality-atlas-001'
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: monstruo-reality-atlas-001

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Scheduler Wrapper
        run: |
          cd bridge/reactor_vigilia_foundation/reactor_heartbeat_r0
          python3 scheduler/scheduler_wrapper.py

      - name: Commit scheduler state (if changed)
        run: |
          git config user.name "monstruo-heartbeat[bot]"
          git config user.email "heartbeat@monstruo.local"
          cd bridge/reactor_vigilia_foundation/reactor_heartbeat_r0
          if git diff --quiet scheduler/ && git diff --quiet scripts/ && git diff --quiet ../state_fabric/; then
            echo "No state changes to commit."
          else
            git add scheduler/scheduler_state.json
            git add scheduler/scheduler_report.md
            git add ../state_fabric/event_log.v0.jsonl
            git add ../state_fabric/current_state.v0.json
            git add heartbeat_manifest.v0_1.json || true
            git add heartbeat_decision.v0_1.json || true
            git add heartbeat_report.v0_1.json || true
            git add heartbeat_report.v0_1.md || true
            git add heartbeat_event_log_delta.v0_1.jsonl || true
            git add unified_face_heartbeat_summary.v0_1.md || true
            git commit -m "chore(heartbeat): R0 cycle $(date -u +%Y-%m-%dT%H:%M:%SZ)" || true
            git push || true
          fi
