embryo_id: oracle_ai_embryo_r0
version: "0.2.0"
status: AUTONOMOUS_R0_SHADOW

allowed_action_classes:
  - A0_OBSERVE
  - A1_ANALYZE
  - A2_PREPARE_EVIDENCE
  - A3_CREATE_NON_PRODUCTIVE_ARTIFACT

forbidden_action_classes:
  - R1
  - R2
  - R3
  - R4
  - R5
  - MEMORY_WRITE
  - SUPABASE_WRITE
  - DB_WRITE
  - SECRET_READ
  - SECRET_WRITE
  - PR_CREATE
  - DEPLOY
  - MAIN_WRITE
  - APP_VISION_UPDATE
  - CANONIZE
  - PRE_IA_CLOSE

providers_allowed:
  - name: OpenAI
    model: gpt-4o-mini
  - name: Anthropic
    model: claude-sonnet-4-20250514
  - name: Google
    model: gemini-2.0-flash
  - name: xAI
    model: grok-3-mini-fast

providers_blocked:
  - Perplexity
  - DeepSeek

budget:
  max_usd_per_cycle: 0.03
  max_calls_per_provider: 1
  retries: 0

kill_switch:
  path: bridge/reactor_vigilia_foundation/reactor_heartbeat_r0/scheduler/scheduler_kill_switch.json
  rule: "if active:true -> abort"

dispatcher:
  integration: required
  bypass: forbidden
  events:
    - DISPATCHER_REQUEST
    - DISPATCHER_ALLOW
    - DISPATCHER_DENY

# ============================================================
# GROUNDING CONTRACT v0.2
# ============================================================
grounding:
  version: "0.2.0"
  enabled: true

  # Every claim in the output must include these fields
  mandatory_claim_fields:
    - claim_id
    - claim_text
    - claim_type
    - evidence_status
    - source_ref
    - freshness_required
    - confidence

  # Output-level grounding fields
  output_level_fields:
    - grounding_level
    - next_valid_action

  # Allowed evidence statuses
  evidence_statuses:
    - VERIFIED_LOCAL
    - VERIFIED_PROVIDER
    - NEEDS_REAL_TIME_CHECK
    - NO_SOURCE
    - HYPOTHESIS
    - CANDIDATE_ONLY

  # Claim types
  claim_types:
    - factual
    - analytical
    - hypothetical

  # Rules
  rules:
    current_fact_mandate: >
      If the Oracle mentions dates, models, current capabilities, availability,
      prices, endpoints, or current tools, it MUST mark the claim as
      NEEDS_REAL_TIME_CHECK unless it possesses verifiable evidence.
    no_source_fact_prohibition: >
      It is strictly PROHIBITED to present a claim marked as NO_SOURCE or
      HYPOTHESIS as a current, verified fact.
