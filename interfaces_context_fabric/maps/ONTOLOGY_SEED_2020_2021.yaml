# 10 principios pre-IA
principios:
  - id: PRE-IA-001
    nombre: Índice Universal por Capas
    fuente_manuscrita: |
      Hay que crear una estructura de clasificación de temas.
      Estructura por capas. Capa 1: lo más universal.
    mapeo_actual:
      - 4 Catastros con Trono Score
      - 9 capas de Cronos
      - estructura Daily/Cockpit
      - organización del kernel
    estado: HIPOTESIS_NACIENTE_T1_LIVE

  - id: PRE-IA-002
    nombre: Ritmo Soberano
    fuente_manuscrita: |
      Es importante no dejar que los pendientes o tareas que surjan durante el día
      marquen el ritmo de mi día a día. Debo apegarme a tareas previamente planeadas.
    mapeo_actual:
      - Rhythm Gate (órgano latente C)
      - Modo Confidente
      - ejecución consciente 7 capas
      - principio "describir, no prescribir" del Modo Espejo de Cronos
    estado: HIPOTESIS_NACIENTE_T1_LIVE

  - id: PRE-IA-003
    nombre: Delegación por Clasificación Universal
    fuente_manuscrita: |
      Tengo que hacer una lista de personas a las que puedo delegar tareas
      según mi 'Clasificación Universal'.
    mapeo_actual:
      - Delegation Router (órgano latente D)
      - Catastro de Suppliers
      - Catastro de Herramientas AI
      - sistema de Embriones
      - Hilos Manus
      - Bridge inter-cuenta
    estado: HIPOTESIS_NACIENTE_T1_LIVE

  - id: PRE-IA-004
    nombre: Foco en 5 Objetivos
    fuente_manuscrita: |
      Tengo que definir mis 5 objetivos principales y no concentrarme en otros
      hasta terminar...
    mapeo_actual:
      - Focus Guard (órgano latente E)
      - Modo Daily reducción a 5 superficies
