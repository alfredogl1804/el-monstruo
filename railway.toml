# El Monstruo — Railway Config
# Sprint 1 — validated 2026-04-12
# Docs: https://docs.railway.com/config-as-code

[build]
# Use Dockerfile instead of Nixpacks
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"

[deploy]
# Railway injects PORT env var automatically
startCommand = "python -m uvicorn kernel.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 1
