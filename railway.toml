# El Monstruo — Railway Config
# Fix 2026-04-13: eliminado startCommand (causa ambigüedad con CMD del Dockerfile)
# El arranque lo maneja run.py dentro del contenedor
# Recomendación del Consejo de Sabios

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.web"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
