# ═══════════════════════════════════════════════════════════════════════════════
# EL MONSTRUO — PISO 3: AGRUPADOR INTERMEDIO
# ═══════════════════════════════════════════════════════════════════════════════
# Propósito: Cada área del Piso 4 se descompone en sus componentes con:
#   - Qué hace cada componente
#   - Dónde vive (path, servicio, tabla)
#   - Estado real (activo/parcial/código_existe/vacío/diseñado/0%)
#   - Dependencias (qué necesita de otras áreas)
#   - Gaps conocidos
#
# Tiempo de lectura: 5-8 minutos. Suficiente para entender la arquitectura
# sin leer código. Si necesitas implementar → baja al Piso 2 (Genoma) o Piso 1 (repo).
#
# Última actualización: 2026-05-21
# ═══════════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════════
# ÁREA A: CEREBRO (Orquestación + Razonamiento)
# ═══════════════════════════════════════════════════════════════════════════════
A_CEREBRO:

  A1_LANGGRAPH_ENGINE:
    que_hace: Grafo de ejecución principal — recibe input, rutea a nodos, ejecuta tools, genera output
    donde_vive:
      codigo: kernel/engine.py, kernel/nodes.py, kernel/state.py
      servicio: el-monstruo-kernel (Railway)
    estado: ACTIVO
    dependencias: [B_MEMORIA.checkpointer, C_AUTONOMIA.finops]
    gaps: []

  A2_MOC:
    que_hace: Motor de Orquestación Central — prioriza tareas y sintetiza resultados de ciclos
    donde_vive:
      codigo: kernel/moc/ (moc.py, priorizador.py, sintetizador.py)
    estado: ACTIVO
    dependencias: [A1_LANGGRAPH_ENGINE]
    gaps: ["No conectado al Plan Regulador para auto-priorización"]

  A3_EMBRION_LOOP:
    que_hace: >
      Pensamiento autónomo. Cada 60s revisa triggers (mensajes, patrones, radar).
      Si hay trigger → piensa (consulta sabios, ejecuta tools, genera respuesta).
      Budget: $30/day, max 50 thoughts/day, cooldown 300s entre pensamientos.
    donde_vive:
      codigo: kernel/embrion_loop.py (2,666 LOC)
      servicio: el-monstruo-kernel (Railway, background task)
      tablas: embrion_memoria, embrion_budget_state, embrion_inbox
    estado: ACTIVO pero PARALIZADO
    dependencias: [B_MEMORIA.sms, C_AUTONOMIA.escape, C_AUTONOMIA.espiral, D_INTELIGENCIA.sabios]
    gaps:
      - "Último trigger: mayo 10 (11 días sin pensar)"
      - "write_policy_rejected: 95 (el loop intenta escribir pero algo lo bloquea)"
      - "No hay canal directo Alfredo→embrion_loop excepto via embrion_memoria manual"

  A4_SUPERVISOR:
    que_hace: Multi-agent routing — decide qué agente/embrión maneja cada request
    donde_vive:
      codigo: kernel/supervisor.py, kernel/multi_agent.py
    estado: CODIGO_EXISTE
    dependencias: [A1_LANGGRAPH_ENGINE, D_INTELIGENCIA.embriones]
    gaps: ["No hay evidencia de routing real en producción"]

  A5_TOOL_SYSTEM:
    que_hace: 39 herramientas registradas que el kernel puede invocar (browser, code, deploy, email, etc.)
    donde_vive:
      codigo: tools/ (39 archivos), kernel/tool_broker.py, kernel/tool_dispatch.py, kernel/tool_registry.py
    estado: ACTIVO
    dependencias: [A1_LANGGRAPH_ENGINE]
    gaps: ["tool_calls_total: 0 hoy — las tools existen pero no se invocan sin pensamientos"]

  A6_CATASTRO_MODELOS:
    que_hace: Inventario de 41 modelos LLM con benchmarks, costos, y routing rules
    donde_vive:
      codigo: kernel/catastro/, kernel/catastros/
      tablas: catastro_modelos (41 registros)
    estado: ACTIVO (datos poblados)
    dependencias: []
    gaps: ["El kernel usa 4 modelos fijos — no consulta el catastro para routing dinámico"]

