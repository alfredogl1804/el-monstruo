[project]
name = "el-monstruo"
version = "0.1.0"
description = "El Monstruo — Sistema de Inteligencia Artificial Soberana"
requires-python = ">=3.11"
license = {text = "Proprietary"}
authors = [
    {name = "Alfredo Góngora", email = "alfredogl1@hivecom.mx"},
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.ruff]
target-version = "py311"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]
