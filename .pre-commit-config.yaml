# Pre-commit hooks for El Monstruo (Sprint S-001 task S-1.1)
# Reference: bridge/sprints_propuestos/sprint_S001_security_hardening.md

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks
        name: gitleaks-staged

  - repo: local
    hooks:
      - id: trufflehog-prepush
        name: trufflehog-prepush
        entry: scripts/_pre_push_trufflehog.sh
        language: system
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=5120']
      - id: check-merge-conflict

  # DSC-G-008 v2 + DSC-G-012 + DSC-G-017: linter de specs de sprint.
  # Solo corre en archivos staged dentro de bridge/sprints_propuestos/.
  # Modo estricto se activa per-spec via marcador `lint_strict: true` en
  # frontmatter YAML o `<!-- lint_strict -->` en HTML comment.
  - repo: local
    hooks:
      - id: spec-lint
        name: spec-lint (DSC-G-008 v2 + G-012 + G-017)
        entry: python3 tools/spec_lint.py
        language: system
        files: ^bridge/sprints_propuestos/.*\.md$
        pass_filenames: true

  # DSC-S-006 regla 1 + DSC-S-004: linter de RLS por defecto en migraciones SQL.
  # Sprint S-002.6 - Tarea 5.
  # Bloquea commits con CREATE TABLE/MATERIALIZED VIEW que no agreguen RLS/REVOKE
  # ni un comentario explícito '-- DSC-S-006: skip RLS justificado: <razón>'.
  # Tambien detecta os.environ.get(SUPABASE_*, 'default-secreto') en .py.
  - repo: local
    hooks:
      - id: rls-default-check
        name: rls-default-check (DSC-S-006 + DSC-S-004)
        entry: python3 scripts/_check_rls_default.py
        language: system
        files: \.(sql|py)$
        pass_filenames: true

  # Sprint GUARDIAN-AUTONOMO-001 T6 (2026-05-12): hook anti-stale-audit.
  # Verifica que `guardian_audit_log` tiene una corrida reciente (< 48h).
  # Si no hay DB local, hace skip (el audit autoritativo corre en Railway).
  # NO bloquea el commit por diseno (un dev local no puede arreglar un
  # problema de infraestructura remota). Solo emite WARN visible en stderr.
  # Escape hatch: GUARDIAN_STALE_HOOK_DISABLED=true.
  - repo: local
    hooks:
      - id: guardian-stale-audit-warn
        name: guardian-stale-audit-warn (Sprint GUARDIAN-AUTONOMO-001 T6)
        entry: python3 scripts/_check_guardian_stale_audit.py
        language: system
        pass_filenames: false
        stages: [pre-push]
        verbose: true

  # DSC-G-017 enforcement: contrato ejecutable adjunto en DSCs.
  # Sprint TRANSVERSAL-001 - Tarea T8 (CA6).
  # Bloquea commits que agreguen/modifiquen DSCs en discovery_forense/CAPILLA_DECISIONES/
  # sin entry en _dsc_contracts_index.yaml o seccion '## Contrato ejecutable' o
  # marcador '**Estado:** Aspiracional'.
  - repo: local
    hooks:
      - id: dsc-contract-check
        name: dsc-contract-check (DSC-G-017)
        entry: python3 tools/dsc_contract_check.py
        language: system
        files: ^discovery_forense/CAPILLA_DECISIONES/.*\.md$
        pass_filenames: true
