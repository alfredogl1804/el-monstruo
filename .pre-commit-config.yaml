# Pre-commit hooks for El Monstruo (Sprint S-001 task S-1.1)
# Reference: bridge/sprints_propuestos/sprint_S001_security_hardening.md

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks
        name: gitleaks-staged

  - repo: local
    hooks:
      - id: trufflehog-prepush
        name: trufflehog-prepush
        entry: scripts/_pre_push_trufflehog.sh
        language: system
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=5120']
      - id: check-merge-conflict

  # DSC-G-008 v2 + DSC-G-012 + DSC-G-017: linter de specs de sprint.
  # Solo corre en archivos staged dentro de bridge/sprints_propuestos/.
  # Modo estricto se activa per-spec via marcador `lint_strict: true` en
  # frontmatter YAML o `<!-- lint_strict -->` en HTML comment.
  - repo: local
    hooks:
      - id: spec-lint
        name: spec-lint (DSC-G-008 v2 + G-012 + G-017)
        entry: python3 tools/spec_lint.py
        language: system
        files: ^bridge/sprints_propuestos/.*\.md$
        pass_filenames: true
