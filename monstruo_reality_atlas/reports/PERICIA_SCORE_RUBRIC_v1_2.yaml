      - "INTERFACES_CONTEXT_FABRIC"
      - "APP_VISION"
      - "MOBILE_FLUTTER_REALITY"
    evidence_required: "EXISTING_DESIGN_COVERAGE_MATRIX leida + APP_VISION como doctrina no runtime + placeholders identificados"

  - condition: "anonymous_security_not_absorbed"
    max_global_score: 90
    frente: "ANONYMOUS_SECURITY_IDENTITY"
    evidence_required: "anonymous = BLOCKER preventivo + 3 identity layers distinguidas"

  - condition: "smp_cronos_cripta_preia_not_absorbed"
    max_global_score: 90
    frentes:
      - "SMP_CRONOS_CRIPTA"
      - "PRE_IA"
    evidence_required: "SMP = Sovereign Memory Plane + aliases descartados + PRE-IA = DRAFT"

  - condition: "command_center_portfolio_not_absorbed"
    max_global_score: 92
    frentes:
      - "COMMAND_CENTER"
      - "PORTFOLIO_UI_EMPRESAS_HIJAS"
    evidence_required: "7 superficies reales vs 12-15 canonicas + portfolio NO existe"

  - condition: "global_95_coverage_incomplete"
    max_global_score: 90
    frente: "GLOBAL_95_REQUIRED_COVERAGE (any frente < 9/10)"
    evidence_required: "Todos los 9 frentes con score >= 9/10"

# ============================================================
# REQUISITOS PARA RECLAMAR GLOBAL_95
# ============================================================
