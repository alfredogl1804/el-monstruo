name: el_monstruo_app
description: "El Monstruo — Agente IA Soberano. App móvil con Generative UI."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.0
  flutter: ^3.29.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  flutter_markdown: ^0.7.7
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking & API
  dio: ^5.7.0
  web_socket_channel: ^3.0.2

  # GenUI / A2UI (Generative UI)
  # genui: ^0.1.0  # TODO: add when available
  # genui_a2a: ^0.1.0  # TODO: add when available
  # a2a: ^0.1.0  # TODO: add when available

  # Storage & Persistence
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5
  hive_flutter: ^1.1.0

  # Push Notifications
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  file_picker: ^8.1.7
  image_picker: ^1.1.2
  connectivity_plus: ^6.1.4
  logging: ^1.3.0

  # Code Highlighting (for sandbox viewer)
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0

  # Foldable Support
  dual_screen: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
