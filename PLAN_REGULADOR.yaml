      last_verified: "2026-05-21"

    - id: embrion_loop
      zone: specialists
      path: kernel/embrion_loop.py
      health: healthy
      memory_connected: false  # USA embrion_memoria, NO el SMS
      last_verified: "2026-05-21"

    - id: catastro
      zone: intelligence
      path: kernel/catastro/
      health: healthy
      tables: 10
      last_verified: "2026-05-21"

    - id: lightrag
      zone: intelligence
      path: kernel/learning/
      health: degraded  # funciona pero no se actualiza
      tables: 14
      last_verified: "2026-05-21"

    - id: bot_telegram
