# ═══════════════════════════════════════════════════════════════════════════════
# GOLDEN PATHS (rutas obligatorias — formato evaluable)
# ═══════════════════════════════════════════════════════════════════════════════

golden_paths:
  knowledge_write:
    route: [any_component, sms_api_ingest, audn_validation, sovereign_memories]
    violation_check: "INSERT INTO sovereign_memories WITHOUT going through /sms/ingest"
    violation_action: REJECT_PR

  knowledge_read:
    route: [any_component, graph_enhanced_recall_or_sms_recall, response]
    violation_check: "SELECT FROM embrion_memoria OR monstruo_memory OR mem0 directly"
    violation_action: WARN_DEPRECATED

  execution:
    route: [interface, kernel_router, embrion, response]
    violation_check: "interface calls embrion directly without kernel routing"
    violation_action: REJECT_PR

  observability:
    route: [any_action, langfuse_trace, cost_logged]
    violation_check: "model call without trace_id"
    violation_action: WARN

