# ═══════════════════════════════════════════════════════════════════════════════
# DECISION ENGINE
# Reglas evaluables que una IA ejecuta ANTES de construir algo.
# Formato: condition → action. Sin prosa.
# ═══════════════════════════════════════════════════════════════════════════════

decision_rules:
  before_building:
    - id: DR-001
      condition: "component_exists_in(MONSTRUO_GENOME.yaml, proposed_name)"
      action: HALT
      message: "Ya existe. Usa o mejora lo existente."

    - id: DR-002
      condition: "proposed_component.needs_persistence AND NOT uses(sms_api)"
      action: REJECT
      message: "Toda persistencia pasa por el SMS. No crear tablas propias."

    - id: DR-003
      condition: "proposed_component.zone == null"
      action: REJECT
      message: "No cabe en ninguna zona. Replantear o solicitar zona nueva."

    - id: DR-004
      condition: "zone(proposed_component.zone).table_count + proposed_tables > zone.max_tables"
      action: REJECT
      message: "Zona sobre-densa. Demoler antes de construir."

    - id: DR-005
      condition: "proposed_component.is_embrion AND NOT proposed_component.sms_connected"
      action: REJECT
      message: "Todo embrión debe conectarse al SMS (recall + store)."

    - id: DR-006
      condition: "proposed_component.dependencies.any(d => d.state == 'debt')"
      action: WARN
      message: "Depende de deuda no resuelta. Resolver deuda primero o aceptar riesgo."

    - id: DR-007
      condition: "proposed_component.is_new_project AND NOT connection_to_sol.defined"
      action: REJECT
      message: "Todo proyecto (planeta) debe definir su conexión al sol."

  before_demolishing:
    - id: DR-008
      condition: "table.records > 0 AND NOT migration_plan.exists"
      action: HALT
      message: "No demoler datos sin plan de migración."

    - id: DR-009
      condition: "component.state != 'deprecated'"
      action: REJECT
      message: "Solo se demoler lo previamente marcado como deprecated."

  before_proposing:
    - id: DR-010
      condition: "proposal.dependencies.all(d => d.state == 'production')"
      action: APPROVE_FOR_BUILD
      message: "Todas las dependencias están en producción. Se puede construir."

    - id: DR-011
      condition: "proposal.dependencies.any(d => d.state == 'debt')"
      action: DEFER
      message: "Resolver deuda primero. Propuesta queda en cola."

    - id: DR-012
      condition: "proposal.dependencies.any(d => d.state == 'proposal')"
      action: CHAIN
      message: "Depende de otra propuesta. Construir en secuencia."

# ═══════════════════════════════════════════════════════════════════════════════
# ZONES (definición pura — sin analogías)
# ═══════════════════════════════════════════════════════════════════════════════

zones:
  central:
    purpose: routing_auth_orchestration
    location: kernel/main.py + kernel/auth.py + kernel/rotor/
    max_tables: 6
    current_tables: 3
    allowed_operations: [route, authenticate, health_check, rate_limit]
    forbidden_operations: [business_logic, data_storage, model_inference]

  memory:
    purpose: persistent_knowledge_sovereign
    location: kernel/memory/ + kernel/anti_dory/
    max_tables: 20
    current_tables: 16
    allowed_operations: [store, recall, invalidate, consolidate, graph_query, decay]
    forbidden_operations: [direct_model_call, user_facing_response, file_storage]
    is_single_source_of_truth: true

  specialists:
    purpose: task_execution_by_domain
    location: kernel/embriones/ + kernel/embrion_loop.py + kernel/collective/
    max_tables: 5
    current_tables: 3
    allowed_operations: [execute_task, read_memory, write_memory, collaborate]
    forbidden_operations: [own_persistence, direct_db_access, bypass_kernel]
    mandatory_pre_hook: graph_enhanced_recall
    mandatory_post_hook: store_memory_if_valuable

  interfaces:
    purpose: external_connection_transport
    location: bot/ + apps/ + kernel/a2ui/ + kernel/mcp/
    max_tables: 0
    current_tables: 0
    allowed_operations: [receive_input, send_output, format_response]
    forbidden_operations: [db_access, model_inference, state_storage]

  intelligence:
    purpose: research_catalog_evaluate
    location: kernel/catastro/ + kernel/learning/ + kernel/vanguard/
    max_tables: 15
    current_tables: 14
    allowed_operations: [register_model, evaluate_model, research, index_knowledge]
    forbidden_operations: [execute_production_task, user_facing_response]

  governance:
    purpose: security_audit_decisions_compliance
    location: kernel/security/ + kernel/sovereignty/ + discovery_forense/
    max_tables: 8
    current_tables: 5
    allowed_operations: [audit, decide, enforce, rotate_secrets, document]
    forbidden_operations: [build_features, execute_tasks, store_user_data]

