# ═══════════════════════════════════════════════════════════════════════════════
# PLAN_REGULADOR.yaml v2.0
# ═══════════════════════════════════════════════════════════════════════════════
# PROPÓSITO: Sistema de estado vivo para toma de decisiones de IA.
# NO es documentación. Es un GRAFO DE DECISIÓN evaluable programáticamente.
# CONSUMIDOR: Cualquier IA que opere sobre el Monstruo o sus proyectos.
# ACCIÓN AL LEER: Usar para decidir QUÉ construir, DÓNDE, y SI se debe.
# ═══════════════════════════════════════════════════════════════════════════════

schema_version: "2.0"
last_sync: "2026-05-21T23:00:00Z"
next_sync_trigger: "on_merge_to_main OR manual"

# ═══════════════════════════════════════════════════════════════════════════════
# SISTEMA SOLAR: El Monstruo (sol) + sus proyectos (planetas)
# Cada planeta hereda las reglas del sol pero tiene autonomía interna.
# ═══════════════════════════════════════════════════════════════════════════════

solar_system:
  sol:
    id: el-monstruo
    role: factory_and_command_center
    repo: alfredogl1804/el-monstruo
    runtime: railway
    db: supabase/xsumzuhwmivjgftsneov
    state: production
    capabilities:
      - orchestration
      - memory_sovereign
      - agent_registry
      - knowledge_graph
      - belief_revision
      - decay_consolidation
      - catastro_ias
      - governance

  planets:
    - id: ticketlike
      repo: alfredogl1804/like-kukulkan-tickets
      connection_to_sol: [memory_read, catastro_query, brand_compliance]
      state: production
      autonomy: high  # tiene su propia DB, deploy, dominio

    - id: cip
      repo: null
      connection_to_sol: [memory_read, memory_write, financial_embrion]
      state: proposal
      autonomy: null

    - id: softrestaurant-10x
      repo: null
      connection_to_sol: [memory_read, catastro_query, research_engine]
      state: proposal
      autonomy: null

    - id: zona-like-313
      repo: null
      connection_to_sol: [memory_read, brand_engine, ventas_embrion]
      state: active_planning
      autonomy: low  # depende del sol para casi todo

    - id: leones-cortometraje
      repo: null
      connection_to_sol: [memory_read, creative_embrion, brand_engine]
      state: active_planning
      autonomy: low

  connection_contract:
    every_planet_must:
      - read_from: sol.memory  # Heredar conocimiento del Monstruo
      - register_in: sol.catastro  # Estar inventariado
      - comply_with: sol.brand  # Respetar marca
      - report_to: sol.governance  # Auditable
    every_planet_can:
      - have_own_db: true
      - have_own_deploy: true
      - have_own_domain: true
      - ignore_sol_embriones: false  # DEBEN usar los embriones del sol

# ═══════════════════════════════════════════════════════════════════════════════
# ESTADO DE COMPONENTES
# Cada componente tiene UN estado. No hay ambigüedad.
# Estados posibles: production | debt | proposal | deprecated | demolished
# ═══════════════════════════════════════════════════════════════════════════════

