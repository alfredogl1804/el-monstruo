# Rúbrica de Equivalencia Funcional
rubric:
  state_accuracy:
    weight: 20
    description: "Identifica correctamente el estado actual del sistema."
  blocker_retention:
    weight: 20
    description: "No pierde ningún blocker P0/P1."
