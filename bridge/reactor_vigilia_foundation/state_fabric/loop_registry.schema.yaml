$schema: "http://json-schema.org/draft-07/schema#"
title: "Loop Registry Schema v0"
type: "object"
patternProperties:
  "^[a-zA-Z0-9_]+$":
    type: "object"
    properties:
      loop_id: { type: "string" }
      role: { type: "string" }
      status: { type: "string", enum: ["NOT_RUNNING", "RUNNING", "BLOCKED", "TERMINATED"] }
      max_autonomy_level: { type: "string" }
      allowed_event_types:
        type: "array"
        items: { type: "string" }
      allowed_read_paths:
        type: "array"
        items: { type: "string" }
      allowed_write_paths:
        type: "array"
        items: { type: "string" }
      forbidden_actions:
        type: "array"
        items: { type: "string" }
      auditor_required: { type: "boolean" }
      heartbeat_policy: { type: "string" }
      owner: { type: "string" }
      runtime_allowed: { type: "boolean" }
      notes: { type: "string" }
    required:
      - loop_id
      - role
      - status
      - max_autonomy_level
      - runtime_allowed
