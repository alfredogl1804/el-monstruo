sprint_candidate_schema:
  version: "0.1"
  type: object
  properties:
    sprint_id:
      type: string
    title:
      type: string
    purpose:
      type: string
    expected_value:
      type: string
    implementation_scope:
      type: string
    files_likely_touched:
      type: array
      items:
        type: string
    tests_required:
      type: array
      items:
        type: string
    complexity:
      type: string
      enum: [Low, Medium, High]
    risk_class:
      type: string
      enum: [Low, Medium, High]
    dependencies:
      type: array
      items:
        type: string
    provider_dependency:
      type: array
      items:
        type: string
    estimated_cost:
      type: number
    expected_time_to_value:
      type: string
    value_score:
      type: number
    risk_score:
      type: number
    next_valid_action:
      type: string
    what_not_to_do:
      type: string
  required:
    - sprint_id
    - title
    - purpose
    - expected_value
    - implementation_scope
    - value_score
    - risk_score
