# ============================================================
# INYECCIÓN RÁPIDA
# ============================================================
injection_commands:
  sandbox: |
    python3.11 /home/ubuntu/skills/api-context-injector/scripts/inject_secrets.py \
      --project /home/ubuntu/monstruo-sprint1 --target sandbox

  railway: |
    # Usar Railway CLI o dashboard para agregar env vars
    # railway variables set ANTHROPIC_API_KEY=xxx
    # railway variables set GEMINI_API_KEY=xxx
    # railway variables set LANGFUSE_PUBLIC_KEY=xxx
    # railway variables set LANGFUSE_SECRET_KEY=xxx
    # railway variables set LANGFUSE_HOST=https://cloud.langfuse.com

  vercel_consola: |
    python3.11 /home/ubuntu/skills/api-context-injector/scripts/inject_secrets.py \
      --project /home/ubuntu/monstruo-consola --target vercel --dry-run
