  - build monstruo
  - sprint 1 monstruo
  - arsenal monstruo
  - herramientas monstruo
  - stack monstruo
depends_on:
  - api-context-injector
  - el-monstruo
  - el-monstruo-plan
feeds_into:
  - El hilo que construya El Monstruo real
files:
