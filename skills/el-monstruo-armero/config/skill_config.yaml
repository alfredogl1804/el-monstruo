name: el-monstruo-armero
version: "1.0"
description: >
  Arsenal futuro pre-investigado para construir El Monstruo.
  Herramientas, frameworks, APIs y configuraciones listas para inyectar
  cuando se construya el Monstruo real (Sprint 1+).
category: core_project
triggers:
