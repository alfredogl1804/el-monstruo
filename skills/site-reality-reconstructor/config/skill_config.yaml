    max_age_days: 180
  - rank: 13
    type: "inference"
    label: "Inferencia conservadora"
    max_confidence: 0.40
    max_age_days: null

## Blind Spot Policies
blind_spot_policies:
  - status: "confirmed_visible"
    render_policy: "render_as_observed"
  - status: "mapped_not_visible"
    render_policy: "neutral_mass"
  - status: "high_confidence_inferred"
    render_policy: "low_detail_context"
  - status: "low_confidence_inferred"
    render_policy: "neutral_mass"
  - status: "unknown_do_not_detail"
    render_policy: "omit"

## Render Validation
validation:
  critical_violation_auto_fail: true
  min_pass_score: 0.65
  max_regeneration_attempts: 3

## Critical Rules (auto-fail if violated)
critical_rules:
  - "NO inventar edificio donde el lote está vacío"
  - "NO subir contexto de 1-2 niveles a 5+ niveles"
  - "NO añadir paisajismo exuberante inexistente"
  - "NO cambiar superficie de tierra/estacionamiento por boulevard premium"
  - "NO omitir elemento marcado como must_include"
  - "NO inventar cuerpos de agua inexistentes"
  - "NO añadir transporte masivo inexistente"
  - "NO poner casas donde hay terreno baldío"
  - "NO inventar vegetación densa donde hay suelo seco"
