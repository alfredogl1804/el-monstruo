# Reglas de seguridad (override defaults)
security:
  # Archivos/dirs donde NUNCA deben aparecer secrets
  forbidden_locations:
    - "src/"
    - "public/"
    - "static/"
    - "dist/"
    - "*.html"
    - "*.css"
  # Archivos/dirs donde SÍ pueden estar
  allowed_locations:
    - ".env"
    - ".env.local"
    - ".env.production"
    - "server/"
    - "api/"
  # Prefijos que exponen al frontend (Vite, Next.js, etc.)
  dangerous_prefixes:
    - "VITE_"
    - "NEXT_PUBLIC_"
    - "REACT_APP_"
    - "EXPO_PUBLIC_"
