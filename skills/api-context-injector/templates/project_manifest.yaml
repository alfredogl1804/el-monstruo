# ============================================================
# Project Secrets Manifest — Template
# api-context-injector v3.1
# ============================================================
# Copiar este archivo al root del proyecto como:
#   .secrets-manifest.yaml
# Luego ejecutar:
#   python3.11 inject_secrets.py --project /path/to/project
# ============================================================

version: "1.0"

# Metadata del proyecto
project:
  name: "mi-proyecto"
  scaffold: "auto"          # auto | web-static | web-db-user | mobile-app | cloudflare-worker | next-vercel | custom
  type: "auto"              # auto | frontend_only | fullstack | mobile | edge
  injection_mode: "auto"    # auto | BACKEND_ONLY | WRANGLER_SECRETS | VERCEL_ENV | MANUAL_REVIEW

# Destinos de inyección (puede ser múltiple)
targets:
  - type: "sandbox"         # sandbox | vercel | cloudflare | supabase
    enabled: true
  # - type: "vercel"
  #   enabled: true
  #   project_id: "prj_xxxx"  # Opcional: ID del proyecto en Vercel
  # - type: "cloudflare"
  #   enabled: true
  #   account_id: "xxxx"      # Requerido para Cloudflare API
  #   worker_name: "my-worker"
  # - type: "supabase"
  #   enabled: true
  #   project_id: "xxxx"      # Requerido para Supabase Vault

# Secrets requeridos por el proyecto
# Cada secret especifica: fuente, si es requerido, y para qué se usa
secrets:

  # === LLMs ===
  OPENAI_API_KEY:
    service: "OpenAI"
    category: "llm"
    source: "sandbox_env"     # sandbox_env | notion_db | manual
    required: true
    used_for: "Chat completions, embeddings"
    inject_as: "env_var"      # env_var | secret | vault

  # ANTHROPIC_API_KEY:
