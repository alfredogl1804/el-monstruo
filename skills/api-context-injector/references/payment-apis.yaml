providers:
  stripe:
    name: Stripe (Test Mode)
    category: payments
    auth:
      method: api_key
      env_var_source: notion
      endpoint: https://api.stripe.com
    capabilities:
      - payment_processing
      - subscriptions
      - invoicing
      - checkout
