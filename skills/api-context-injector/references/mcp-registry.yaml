# ============================================================
# TIPO 3: Integraciones nativas (CLI, browser, integración directa)
# ============================================================

native_connectors:
  mi-navegador:
    name: Mi navegador
    connector_description: "Accede a la web en tu propio navegador"
    access_method: browser
    use_cases:
      - Navegación web autenticada
      - Automatización de browser
      - Login persistente en sitios
      - Scraping visual
    status: active
    note: "Mantiene estado de login entre tareas"

  google-drive:
    name: Google Drive
    connector_description: "Access your files, search instantly, and let Manus help you manage documents"
    access_method: cli
    cli_tool: gws
    env_var: GOOGLE_DRIVE_TOKEN
    use_cases:
      - Acceder a archivos
      - Buscar documentos
      - Gestionar carpetas
      - Sync bidireccional
    status: active
    note: "También disponible via rclone para bulk sync"

  github:
    name: GitHub
    connector_description: "Gestiona repositorios, realiza seguimiento de los cambios en el código"
    access_method: cli
    cli_tool: gh
    env_var: GH_TOKEN
    use_cases:
      - Gestionar repos
      - Issues y PRs
      - GitHub Actions
      - Code search
    status: active

# ============================================================
# Resumen de conectores
# ============================================================

summary:
  total_connectors: 27
  mcp_servers: 11
  api_connectors: 10
  native_connectors: 3
  all_from_screenshots: true

# Cómo usar MCPs
usage:
  list_tools: "manus-mcp-cli tool list --server {server_name}"
  call_tool: "manus-mcp-cli tool call {tool_name} --server {server_name} --input '{json_args}'"
  notes:
    - "Cada llamada debe ser un comando shell separado"
    - "OAuth se activa automáticamente cuando es necesario"
    - "--server flag es OBLIGATORIO"
    - "Argumentos deben ser JSON válido con --input"
