# Manus Connectors & MCP Servers Registry
# Última actualización: 2026-04-08
# Fuente: Screenshots de Conectores de Manus (27 conectores activos)
# Uso MCP: manus-mcp-cli tool call <tool_name> --server <server_name> --input '<json>'
#
# NOTA: Los conectores de Manus se dividen en 3 tipos:
#   1. MCPs (Model Context Protocol) — interacción via manus-mcp-cli
#   2. APIs con env var — acceso directo via SDK/requests
#   3. Integraciones nativas — acceso via CLI o browser

# ============================================================
# TIPO 1: MCPs (interacción via manus-mcp-cli)
# ============================================================

mcp_servers:
  notion:
    name: Notion
    connector_description: "Busca contenido del espacio de trabajo, actualiza notas y automatiza flujos de trabajo"
    mcp_server: notion
    tools_count: 14
    key_tools:
      - notion-search
      - notion-fetch
      - notion-create-pages
      - notion-update-page
      - notion-create-database
    use_cases:
      - Buscar información en workspace
      - Crear/actualizar páginas
      - Gestionar bases de datos
      - Consultar semilla v7.3
      - Acceder a API Keys DB
    status: active

  supabase:
    name: Supabase
    connector_description: "Administra proyectos de Supabase, consulta bases de datos y organiza datos"
    mcp_server: supabase
    tools_count: 29
    key_tools:
      - execute_sql
      - apply_migration
      - list_tables
      - deploy_edge_function
      - list_projects
    use_cases:
      - Ejecutar SQL
      - Gestionar migraciones
      - Deploy edge functions
      - Gestionar branches
    status: active

  gmail:
    name: Gmail
    connector_description: "Redacta respuestas, busca en tu bandeja de entrada y resume hilos de correo"
    mcp_server: gmail
    use_cases:
      - Enviar emails
      - Leer bandeja de entrada
      - Buscar mensajes
      - Resumir hilos
    status: active

  google-calendar:
    name: Google Calendar
    connector_description: "Comprende tu horario, administra eventos y optimiza tu tiempo"
    mcp_server: google-calendar
    use_cases:
      - Crear eventos
      - Verificar disponibilidad
      - Programar reuniones
      - Optimizar agenda
    status: active

  asana:
    name: Asana
    connector_description: "Simplifica la gestión de proyectos y tareas con Asana"
    mcp_server: asana
    use_cases:
      - Crear/actualizar tareas
      - Gestionar proyectos
      - Tracking de goals
      - Coordinación de equipos
    status: active

  zapier:
    name: Zapier
    connector_description: "Conecta Manus y automatiza flujos de trabajo entre miles de aplicaciones"
    mcp_server: zapier
    use_cases:
      - Conectar aplicaciones
      - Automatizar procesos
      - Sincronizar datos entre apps
    status: active
    note: "Conecta 5000+ aplicaciones"

  vercel:
    name: Vercel
    connector_description: "Administra proyectos, implementaciones y dominios de Vercel"
    mcp_server: vercel
    use_cases:
      - Listar proyectos
      - Ver deployments
      - Gestionar dominios
      - Debug de fallos
    status: active

  paypal-for-business:
    name: PayPal para Empresas
    connector_description: "Gestione transacciones, facturas y operaciones comerciales de manera eficiente"
    mcp_server: paypal-for-business
    use_cases:
      - Capturar órdenes
      - Generar facturas
      - Gestionar suscripciones
      - Tracking de envíos
    status: active

  revenuecat:
    name: RevenueCat
    connector_description: "Administre aplicaciones de suscripción, controle las autorizaciones y automatice"
    mcp_server: revenuecat
    use_cases:
      - Gestionar productos
      - Configurar entitlements
      - Crear offerings/packages
      - Gestionar paywalls
    status: active

  instagram:
    name: Instagram
    connector_description: "Generate and publish Posts, Stories, or Reels to Instagram"
    mcp_server: instagram
    use_cases:
      - Publicar Posts, Stories, Reels
      - Obtener info de cuenta
      - Ver posts e insights
