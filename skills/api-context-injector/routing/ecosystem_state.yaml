# 8. SKILL DECISION FRAMEWORK
# ============================================================
skill_decision:
  before_building_any_skill:
    step_1: "Check skills registry in this file (section 1)"
    step_2: "Check capability_registry for existing coverage"
    step_3: "Scout external sources (GitHub, MCP Market)"
    step_4: "Evaluate with TRUST+FIT if external candidate found"
    step_5: "Decide: install / fork / compose / build"

  decision_matrix:
    install: "Commodity skill, trusted source, compatible license, low risk"
    fork_and_harden: "Good base but needs adaptation or security hardening"
    compose: ">60% of capability exists in internal pieces"
    build: "High differentiation, sensitive data, or no viable external option"
    reject: "Fails hard gates (security, license, compliance)"

