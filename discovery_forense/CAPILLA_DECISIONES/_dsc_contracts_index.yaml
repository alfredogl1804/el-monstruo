# discovery_forense/CAPILLA_DECISIONES/_dsc_contracts_index.yaml
#
# Index canonico DSC -> contrato ejecutable o estado aspiracional (DSC-G-017).
#
# Cada DSC en CAPILLA_DECISIONES tiene exactamente UNA entrada aqui:
#   - status: enforced + contracts: [<paths>]    (categoria B-extended)
#   - status: aspirational + reason: "..."       (categoria A o C)
#
# tools/dsc_contract_check.py consulta este archivo PRIMERO. Si un DSC tiene
# entrada `enforced` con paths que existen en el repo, pasa. Si tiene entrada
# `aspirational` con reason, pasa con warning. Sin entrada, falla.
#
# Modificar este archivo es modificar la gobernanza del repo. Cambios requieren
# PR firmado por Alfredo.
#
# Origen: DSC-G-017, DSC-V-001.

