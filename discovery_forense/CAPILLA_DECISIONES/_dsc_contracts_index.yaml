      canonizado por Cowork T2-A). Contrato ejecutable nuevo:
      tools/_check_index_drift.py compara _INDEX.md declared vs filesystem
      reality, reporta MISSING_FILESYSTEM y MISSING_INDEX, exit 1 si drift.
      Workflow .github/workflows/index-drift-audit.yml corre weekly (lunes
      06:00 UTC) y abre issue automático con labels index-drift +
      auto-detected + doctrina si detecta drift. Tests: 12/12 verdes.

