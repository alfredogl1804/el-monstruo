# El Monstruo — Docker Compose (Development)
# Sprint 1 — Updated 2026-04-12 (all versions double-validated)
# Policy: LiteLLM ONLY via Docker (supply chain risk mitigation)

services:

  # ── LiteLLM Proxy (Router) ──────────────────────────────────────
  # NEVER pip install litellm. Docker image only.
  litellm:
    image: ghcr.io/berriai/litellm:main-v1.83.7.rc.1
    container_name: monstruo-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./config/litellm_config.yaml:/app/config.yaml
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-monstruo-dev}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - monstruo-net

  # ── Langfuse (Observability) ────────────────────────────────────
  langfuse:
    image: langfuse/langfuse:3
    container_name: monstruo-langfuse
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=${LANGFUSE_SECRET:-monstruo-langfuse-secret}
      - NEXTAUTH_URL=http://localhost:3001
      - SALT=${LANGFUSE_SALT:-monstruo-salt-dev}
    depends_on:
      langfuse-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - monstruo-net

  # ── Langfuse Postgres ───────────────────────────────────────────
  langfuse-db:
    image: postgres:18-alpine
    container_name: monstruo-langfuse-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - monstruo-net

  # ── El Monstruo Core (Kernel + Memory + Bot) ────────────────────
  monstruo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monstruo-core
    ports:
      - "8000:8000"    # FastAPI
      - "8001:8001"    # Health/metrics
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - LITELLM_URL=http://litellm:4000
      - LANGFUSE_HOST=http://langfuse:3000
      - PYTHONPATH=/app
    depends_on:
      litellm:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - monstruo-net

volumes:
  langfuse-data:

networks:
  monstruo-net:
    driver: bridge
