gaps:
  critical:
    - id: embrion_loop_isolated
      description: Embrion Loop has memories in embrion_memoria but ZERO connection to SMS v4.0
      impact: No graph, no belief revision, no decay for the main orchestrator
      fix: Bridge embrion_memoria <-> sovereign_memories
    - id: collective_ram_only
      description: Colmena (collective/) operates in RAM, tables never created
      impact: Learned patterns lost on every redeploy
      fix: Create learned_patterns + embrion_knowledge tables, connect to SMS
    - id: embriones_stateless
      description: Domain embriones have no memory at all
      impact: Cannot learn from past invocations
      fix: Each embrion gets graph_enhanced_recall before operating
  moderate:
    - id: bot_offline
      description: Telegram bot returns 404
      fix: Redeploy on Railway
    - id: embeddings_pending
      description: Memories ingested without vector embeddings
      fix: Redeploy kernel with new adapter (entity extraction generates embeddings)
    - id: domain_embriones_doctrine_only
      description: 10 Domain Embriones (Archivista, Concierge, etc.) exist only in doctrine
      fix: Implement in kernel/embriones/ when Capa 0+1 are solid

