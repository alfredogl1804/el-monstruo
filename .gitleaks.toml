    '''tests/.*''',
    '''\.env\.example''',
    '''requirements\.txt''',
    '''docs/biblias_agentes_2026/.*\.md''',
    '''_archive/.*''',
    '''bridge/.*\.md''',
    '''discovery_forense/INCIDENTES/.*\.md''',
    '''discovery_forense/CAPILLA_DECISIONES/.*\.md''',
