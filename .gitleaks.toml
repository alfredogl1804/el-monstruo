# Gitleaks configuration for El Monstruo Kernel
# Exclude known safe patterns and test fixtures

title = "El Monstruo Gitleaks Config"

[allowlist]
  description = "Known safe patterns"
  paths = [
    '''tests/.*''',
    '''\.env\.example''',
    '''requirements\.txt''',
  ]
  regexes = [
    '''your-.*-key''',
    '''placeholder.*''',
    '''test-key-123''',
    '''monstruo-dev-key''',
  ]
